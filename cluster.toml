# Cluster de desarrollo — config de nodos
# Master: este ClockworkPi (192.168.1.226) — Hermes Agent minimax-m3
# Routing: keyword scoring. Slave-A=chat, Slave-B=código. No filesystem access.

[meta]
name = "spids-dev-cluster"
created = "2026-06-12"
constraint = "modelos livianos — no saturar hardware"

[slave-a]
role = "chat_reflection"
host = "192.168.1.123"
protocol = "ollama"
base_url = "http://192.168.1.123:11434"
model = "gemma4:12b-mlx"
fallback_model = "llama3:latest"
purpose = "razonamiento general, reflexión, resúmenes, explicaciones"
timeout_s = 120

[slave-b]
role = "code_tools"
host = "192.168.1.134"
protocol = "lmstudio"
base_url = "http://192.168.1.134:1234/v1"
model = "qwen/qwen3.6-27b"   # MoE ~3B activos, 27B totales — encaja en 32GB VRAM
fallback_model = "qwen/qwen3.6-27b"
purpose = "código, comandos bash, iteración multi-step, tool calling"
timeout_s = 180

# Modelos descartados explícitamente (usuario: saturarían hardware):
# - google/gemma-4-26b-a4b-qat  (26B dense — fuera)
# - qwen/qwen3.6-35b-a3b       (35B MoE — fuera, user pidió 27b específicamente)
# Regla usuario 2026-06-12: "usa qwen3.6-27b que ya está. usa ese y solo ese"

[routing]
# Score por keyword; si supera umbral, va al slave. Empate → slave-b (código).
# Threshold de score: si ninguno pasa, master te pregunta a vos.
code_keywords = [
  "código", "codigo", "code", "function", "función", "funcion",
  "script", "python", "bash", "shell", "regex", "sed", "grep",
  "commit", "git", "build", "compile", "error", "fix", "bug",
  "refactor", "implement", "implementar", "agregar feature",
  "install", "instalar", "npm", "pip", "package", "dependencia",
  "api", "endpoint", "request", "response", "json", "yaml",
  "html", "css", "jsx", "tsx", "astro", "react", "vue",
  "docker", "container", "kubernetes", "deploy",
  "test", "tests", "pytest", "unittest",
  "delegar", "opencode", "subprocess", "import",
]

chat_keywords = [
  "explicá", "explica", "explain", "qué es", "que es", "what is",
  "por qué", "porque", "why", "how", "cómo", "como",
  "resumí", "resume", "summarize", "síntesis", "sintesis",
  "reflexión", "reflexion", "thoughts", "opinión", "opinion",
  "analizá", "analiza", "analyze", "analizar", "pensá", "piensa",
  "compará", "compara", "compare", "diferencia", "difference",
  "plan", "estrategia", "strategy", "approach", "enfoque",
  "filosofía", "filosofia", "concepto", "concept", "teoría", "teoria",
]

# Si el task contiene 'verbatim' o 'literal' → feedback verbatim, no síntesis
verbatim_keywords = [
  "verbatim", "literal", "text completo", "raw output", "crudo",
  "explicá técnicamente", "explica técnicamente", "explicá a fondo",
  "análisis profundo", "análisis técnico", "análisis detallado",
]

[feedback]
mode_default = "synthesis"   # yo te resumo en 2-3 líneas
mode_verbose = "verbatim"    # te pego la respuesta cruda
synthesis_max_lines = 5
